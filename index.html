<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>life zap operater</title>
    <style>
        body {
            /* インターネット黎明期を彷彿とさせるフォント */
            font-family: "ＭＳ Ｐゴシック", "MS PGothic", "Osaka", sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        
        .page-logo {
            width: 250px;
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        /* 動画プレイヤーの外枠 */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9の比率 */
            background: #000;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-wrapper iframe, .video-wrapper #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* 絶対にYouTubeへ飛ばさない透明シールド */
        .shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .info-panel {
            margin-bottom: 20px;
        }

        /* 立体的なガラス風ボタンのUI */
        button {
            background: linear-gradient(to bottom, #fdfdfd 0%, #e0e0e0 100%);
            border: 1px solid #999;
            border-radius: 25px;
            color: #333;
            padding: 10px 24px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 1), 
                0 1px 3px rgba(0, 0, 0, 0.3);
            transition: all 0.1s;
            margin-bottom: 20px;
        }
        button:hover {
            background: linear-gradient(to bottom, #ffffff 0%, #ebebeb 100%);
        }
        button:active {
            background: linear-gradient(to bottom, #d0d0d0 0%, #e8e8e8 100%);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            border-color: #888;
            transform: translateY(1px);
        }
        button:disabled {
            background: #e6e6e6;
            color: #aaa;
            text-shadow: none;
            box-shadow: none;
            border-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 説明文パネルのスタイル */
        .description-panel {
            margin-top: 10px;
            text-align: left;
            line-height: 1.8;
            color: #ddd;
            font-size: 0.95rem;
        }
